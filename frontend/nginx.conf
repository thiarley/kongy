server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Rewrite /api/ prefix if backend expects paths without it
        # rewrite ^/api/(.*) /$1 break; 
        # (Assuming backend is mounted at /api or we keep it)
        # In this project backend router is /api/v1 likely, or just /
        # Based on vite.config proxy: rewrite: (path) => path.replace(/^\/api/, '')
        # So backend expects NO /api prefix.
        rewrite ^/api/(.*) /$1 break;
    }
}
