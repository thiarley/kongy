version: '3.8'

# =============================================================================
# Kongy - Kong Gateway Manager
# Development Environment with Local Kong
# =============================================================================

services:
  # ============================================
  # Kongy Application
  # ============================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    ports:
      - "8081:8081"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/login.html:/app/login.html
      - ./frontend/locales:/app/locales
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      # Exclude node_modules from volume
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - kongy-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - KONG_ADMIN_URL=http://kong:8001
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=true
      - CORS_ORIGINS=["http://localhost:8081", "http://127.0.0.1:8081"]
    ports:
      - "8002:8000"
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - kongy-net
    restart: unless-stopped

  # ============================================
  # Kong Gateway (Local Development)
  # ============================================

  kong-database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: kongpass
      POSTGRES_DB: kong
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    networks:
      - kongy-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U kong" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kong-migrations:
    image: kong:3.5
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
    depends_on:
      kong-database:
        condition: service_healthy
    networks:
      - kongy-net
    restart: on-failure

  kong:
    image: kong:3.5
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kongpass
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PROXY_LISTEN: 0.0.0.0:8000
    ports:
      - "8000:8000" # Kong Proxy (test your APIs here)
      - "8001:8001" # Kong Admin (dev only - DO NOT expose in production!)
    depends_on:
      kong-database:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    networks:
      - kongy-net
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ============================================
  # Mock Upstream Service (for testing)
  # ============================================

  mock-api:
    image: kennethreitz/httpbin
    networks:
      - kongy-net
    restart: unless-stopped

volumes:
  kong-db-data:


networks:
  kongy-net:
    driver: bridge
